name: CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: mobili_test
          POSTGRES_USER: mobili
          POSTGRES_PASSWORD: mobili_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobili/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: mobili/backend
        run: npm ci

      - name: Run Prisma migrate
        working-directory: mobili/backend
        env:
          DATABASE_URL: postgresql://mobili:mobili_test@localhost:5432/mobili_test
        run: npx prisma migrate deploy

      - name: Lint
        working-directory: mobili/backend
        run: npm run lint

      - name: Format check
        working-directory: mobili/backend
        run: npm run format:check

      - name: Tests
        working-directory: mobili/backend
        env:
          DATABASE_URL: postgresql://mobili:mobili_test@localhost:5432/mobili_test
          JWT_SECRET: test_secret
          NODE_ENV: test
        run: npm test

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=mobili
            -Dsonar.sources=mobili/backend/src
            -Dsonar.javascript.lcov.reportPaths=mobili/backend/coverage/lcov.info
