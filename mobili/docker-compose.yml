services:
  postgres:
    image: postgres:15-alpine
    container_name: mobili_postgres
    environment:
      POSTGRES_DB: mobili_db
      POSTGRES_USER: mobili
      POSTGRES_PASSWORD: mobili_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mobili -d mobili_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
